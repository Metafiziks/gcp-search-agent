name: Run Agent Evaluations

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/run_evals.py"
  workflow_dispatch:
  schedule:
    # Weekly — Monday 09:00 UTC
    - cron: "0 9 * * 1"

permissions:
  id-token: write   # Required for Workload Identity Federation
  contents: read

env:
  REGION: us-central1

jobs:
  evaluate:
    name: Evaluate RAG Agent
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests google-cloud-aiplatform -q

      - name: Run evaluations
        env:
          SERVICE_URL: ${{ vars.SERVICE_URL }}
          PROJECT_ID: ${{ vars.PROJECT_ID }}
          REGION: ${{ env.REGION }}
        run: python3 scripts/run_evals.py --output eval_results.json

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.run_number }}
          path: eval_results.json
          retention-days: 90

      - name: Fail if thresholds not met
        if: failure()
        run: |
          echo "One or more eval metrics fell below threshold. See step summary for details." >&2
          exit 1
